syntax = "proto3";

package risc;

import "configs/fu.proto";

option java_package = "arch.configs.proto";
option java_outer_classname = "SchedulerProto";

enum SchedulePolicy {
  SCHEDULE_POLICY_UNSPECIFIED = 0;
  SCHEDULE_POLICY_INORDER = 1;
  SCHEDULE_POLICY_SCOREBOARD = 2;
  SCHEDULE_POLICY_TOMASULO = 3;
}

message SchedulerConfig {
  SchedulePolicy policy = 1;
  repeated FunctionalUnitDescriptor fus = 2;
}
